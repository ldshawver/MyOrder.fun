kind = "web"
previewPath = "/"
title = "OrderFlow Platform"
version = "1.0.0"
id = "artifacts/platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5000

[services.development]
run = "cd /home/runner/workspace/artifacts/platform && ./node_modules/.bin/vite --host 0.0.0.0"

[services.production]
publicDir = "artifacts/platform/dist"
serve = "static"

[services.production.build]
args = [ "pnpm", "--filter", "@workspace/platform", "run", "build" ]

[services.production.build.env]
NODE_ENV = "production"
PORT = "3000"
BASE_PATH = "/"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5000"
BASE_PATH = "/"
