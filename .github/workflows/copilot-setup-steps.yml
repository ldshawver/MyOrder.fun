name: Copilot Setup Steps

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/copilot-setup-steps.yml"
      - "package.json"
      - "pnpm-lock.yaml"

jobs:
  copilot-setup-steps:
    name: copilot-setup-steps
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.26.1"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify repo health
        run: |
          pnpm typecheck
          pnpm build
          pnpm test
