name: VPS MyOrder Audit

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Connect Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-actions

      - name: Verify Tailnet
        run: |
          tailscale status
          tailscale ping 100.85.15.43

      - name: VPS apply 0027 migration
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 100.85.15.43
          username: serveradmin
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 10m
          script_stop: true
          script: |
            set -euo pipefail

            cd /opt/alavont

            echo "== backup =="
            docker exec deploy-db-1 pg_dump -U alavont_user -d alavont > ~/alavont-before-0027-$(date +%F-%H%M).sql

            echo "== apply 0027 =="
            docker exec -i deploy-db-1 psql -U alavont_user -d alavont < lib/db/drizzle/0027_orders_shift_schema_drift.sql

            echo "== restart api/nginx =="
            docker compose --env-file deploy/.env -f deploy/docker-compose.yml -p deploy up -d api nginx

            echo "== health =="
            curl -I http://127.0.0.1/api/healthz
