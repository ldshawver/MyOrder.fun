name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-myorderfun
  cancel-in-progress: true

jobs:
  test:
    name: Typecheck, Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.26.1"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Lint ratchet
        run: pnpm lint:ratchet

      - name: Run tests
        run: pnpm test

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test

    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_HOST_FALLBACK: ${{ secrets.VPS_HOST_FALLBACK || '100.85.15.43' }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
      VPS_HOST_FALLBACK_PORT: ${{ secrets.VPS_HOST_FALLBACK_PORT || '22' }}
      VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
      DEPLOY_PATH: /opt/alavont
      VPS_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY || secrets.VPS_SECRET_KEY }}
      TAILSCALE_AUTHKEY: ${{ secrets.TS_AUTHKEY }}
      TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Confirm deploy commit
        run: |
          echo "Deploying SHA: $GITHUB_SHA"
          git log --oneline -n 1
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"

      - name: Install SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          if [ -z "${VPS_PRIVATE_KEY:-}" ]; then
            echo "::error::Missing VPS SSH private key. Add VPS_SSH_KEY in GitHub Secrets."
            exit 1
          fi

          printf '%s\n' "${VPS_PRIVATE_KEY}" > ~/.ssh/vps_deploy_key
          chmod 600 ~/.ssh/vps_deploy_key
          ssh-keygen -y -f ~/.ssh/vps_deploy_key > /dev/null
          echo "SSH_KEY_PATH=${HOME}/.ssh/vps_deploy_key" >> "$GITHUB_ENV"

      - name: Connect to Tailscale with auth key
        if: env.TAILSCALE_AUTHKEY != ''
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ env.TAILSCALE_AUTHKEY }}

      - name: Connect to Tailscale with OAuth
        if: env.TAILSCALE_AUTHKEY == '' && env.TS_OAUTH_CLIENT_ID != '' && env.TS_OAUTH_SECRET != ''
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ env.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ env.TS_OAUTH_SECRET }}
          tags: tag:github-actions

      - name: Select reachable VPS host and configure known_hosts
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          touch ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          if [ -n "${VPS_KNOWN_HOSTS:-}" ]; then
            echo "Using VPS_KNOWN_HOSTS secret."
            printf '%s\n' "${VPS_KNOWN_HOSTS}" >> ~/.ssh/known_hosts
          fi

          try_host() {
            local host="$1"
            local port="$2"
            local tmp_keys
            tmp_keys="$(mktemp)"

            if [ -z "${host:-}" ]; then
              return 1
            fi

            echo "Scanning ${host}:${port} for host keys..."

            if ssh-keyscan -T 15 -p "$port" -H "$host" > "$tmp_keys" 2>ssh-keyscan.err && [ -s "$tmp_keys" ]; then
              cat "$tmp_keys" >> ~/.ssh/known_hosts
              rm -f "$tmp_keys"
              echo "SELECTED_VPS_HOST=${host}" >> "$GITHUB_ENV"
              echo "SELECTED_VPS_PORT=${port}" >> "$GITHUB_ENV"
              echo "Collected SSH host key(s) for ${host}:${port}."
              return 0
            fi

            echo "No keys from ${host}:${port}."
            cat ssh-keyscan.err || true
            rm -f "$tmp_keys"

            echo "Trying SSH preflight with StrictHostKeyChecking=accept-new for ${host}:${port}..."

            if ssh \
              -i "$SSH_KEY_PATH" \
              -o BatchMode=yes \
              -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=20 \
              -p "$port" \
              "$VPS_USER@$host" \
              'echo "SSH preflight OK:" $(whoami)@$(hostname)' ; then
                echo "SELECTED_VPS_HOST=${host}" >> "$GITHUB_ENV"
                echo "SELECTED_VPS_PORT=${port}" >> "$GITHUB_ENV"
                return 0
            fi

            return 1
          }

          if try_host "$VPS_HOST" "$VPS_PORT"; then
            exit 0
          fi

          echo "Primary VPS_HOST failed. Trying fallback..."

          if try_host "$VPS_HOST_FALLBACK" "$VPS_HOST_FALLBACK_PORT"; then
            exit 0
          fi

          echo "::error::No reachable SSH host found from primary or fallback."
          exit 1

      - name: Verify SSH access
        run: |
          set -euo pipefail

          ssh \
            -i "$SSH_KEY_PATH" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=20 \
            -p "$SELECTED_VPS_PORT" \
            "$VPS_USER@$SELECTED_VPS_HOST" \
            'echo "SSH OK:" $(whoami)@$(hostname)'

      - name: Sync repository to VPS
        run: |
          set -euo pipefail

          ssh \
            -i "$SSH_KEY_PATH" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -p "$SELECTED_VPS_PORT" \
            "$VPS_USER@$SELECTED_VPS_HOST" \
            "mkdir -p $DEPLOY_PATH"

          rsync -az --delete \
            -e "ssh -i $SSH_KEY_PATH -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -p $SELECTED_VPS_PORT" \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='**/node_modules' \
            --exclude='deploy/.env' \
            --exclude='deploy/nginx/ssl' \
            ./ "$VPS_USER@$SELECTED_VPS_HOST:$DEPLOY_PATH/"

      - name: Build and deploy on VPS
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          ssh \
            -i "$SSH_KEY_PATH" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -p "$SELECTED_VPS_PORT" \
            "$VPS_USER@$SELECTED_VPS_HOST" \
            "DEPLOY_SHA='${GITHUB_SHA}' bash -s" << 'ENDSSH'
              set -euo pipefail

              cd /opt/alavont

              echo "SHA=${DEPLOY_SHA:-unknown}" > .deployed-sha
              date -u >> .deployed-sha

              chmod +x deploy/*.sh 2>/dev/null || true

              cd /opt/alavont/deploy

              docker compose down || true
              DEPLOY_SHA="${DEPLOY_SHA:-unknown}" docker compose build --pull
              docker compose up -d db

              for i in $(seq 1 30); do
                if docker compose exec -T db pg_isready -q; then
                  echo "Database ready"
                  break
                fi

                if [ "$i" = "30" ]; then
                  docker compose logs db --tail=80
                  exit 1
                fi

                sleep 2
              done

              docker compose run --rm migrate
              docker compose up -d db api platform nginx

              for i in $(seq 1 30); do
                if curl -fsS http://127.0.0.1/api/healthz; then
                  echo "API healthy"
                  break
                fi

                if [ "$i" = "30" ]; then
                  docker compose ps
                  docker compose logs api --tail=100
                  exit 1
                fi

                sleep 2
              done

              docker compose ps
              docker image prune -f
              echo "Deploy complete"
          ENDSSH

      - name: Verify public site
        run: |
          set -euo pipefail

          for i in $(seq 1 30); do
            if curl -fsS --connect-timeout 10 --max-time 20 https://myorder.fun/api/healthz; then
              echo "Public health check passed"
              exit 0
            fi

            echo "Public health not ready yet: $i/30"
            sleep 2
          done

          echo "::error::Public health check failed"
          exit 1
