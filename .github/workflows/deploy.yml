name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build → Sync → Restart
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Check out the code on the Actions runner ────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up SSH agent with the VPS private key ───────────────
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      # ── 3. Trust the VPS host fingerprint ──────────────────────────
      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # ── 4. Rsync source code to VPS (skip .env and ssl certs) ──────
      - name: Sync code to VPS
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='deploy/.env' \
            --exclude='deploy/nginx/ssl' \
            --exclude='node_modules' \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/alavont/

      # ── 5. Rebuild and restart containers on VPS ───────────────────
      - name: Build images on VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            cd /opt/alavont/deploy
            docker compose build --pull
            echo "BUILD SUCCESS"
          ENDSSH

      - name: Migrate and deploy on VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            cd /opt/alavont/deploy

            # 1. Tear down all stale compose state (keeps named volumes)
            echo "▶ Cleaning stale containers and networks..."
            docker compose down --remove-orphans 2>/dev/null || true
            docker rm -f deploy-db-1 deploy-api-1 deploy-platform-1 deploy-nginx-1 deploy-migrate-1 2>/dev/null || true
            docker network rm deploy_internal deploy_external 2>/dev/null || true
            sleep 2

            # 2. Start DB fresh and wait until healthy
            echo "▶ Starting database..."
            docker compose up -d db
            echo "▶ Waiting for database to be ready..."
            timeout 60 sh -c \
              'until docker compose exec -T db pg_isready -U "${POSTGRES_USER:-alavont}" -d "${POSTGRES_DB:-alavont}" 2>/dev/null; do sleep 2; done'
            echo "  Database ready."

            # 3. Run migrations
            echo "▶ Running migrations..."
            docker compose run --rm migrate
            echo "MIGRATE SUCCESS"

            # 4. Bring up full stack
            echo "▶ Starting all services..."
            docker compose up -d
            echo "DEPLOY SUCCESS"

            docker image prune -f

            echo ""
            echo "════════════════════════════════════"
            echo "  DEPLOY SUCCESS — $(date -u)"
            echo "════════════════════════════════════"
          ENDSSH
