name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build → Sync → Restart
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Check out the code on the Actions runner ────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up SSH agent with the VPS private key ───────────────
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      # ── 3. Trust the VPS host fingerprint ──────────────────────────
      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # ── 4. Rsync source code to VPS (skip .env and ssl certs) ──────
      - name: Sync code to VPS
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='deploy/.env' \
            --exclude='deploy/nginx/ssl' \
            --exclude='node_modules' \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/alavont/

      # ── 5. Rebuild and restart containers on VPS ───────────────────
      - name: Build images on VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            cd /opt/alavont/deploy
            docker compose build --pull
            echo "BUILD SUCCESS"
          ENDSSH

      - name: Migrate and deploy on VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            cd /opt/alavont/deploy

            # 1. Ensure DB is up and healthy (no-op if already running)
            echo "▶ Starting database..."
            docker compose up -d db
            echo "▶ Waiting for database to be ready..."
            timeout 60 sh -c '
              until docker compose exec -T db pg_isready -U "${POSTGRES_USER:-alavont}" -d "${POSTGRES_DB:-alavont}" 2>/dev/null; do
                sleep 2
              done
            '
            echo "  Database ready."

            # 2. Stop only app containers — leave db and its network intact
            echo "▶ Stopping app containers (db stays up)..."
            docker compose stop nginx api platform 2>/dev/null || true

            # 3. Run migrations against the live DB
            echo "▶ Running migrations..."
            docker compose run --rm migrate
            echo "MIGRATE SUCCESS"

            # 4. Bring up the full stack — recreates stopped containers
            echo "▶ Starting all services..."
            docker compose up -d --remove-orphans
            echo "DEPLOY SUCCESS"

            docker image prune -f

            echo ""
            echo "════════════════════════════════════"
            echo "  DEPLOY SUCCESS — $(date -u)"
            echo "════════════════════════════════════"
          ENDSSH
