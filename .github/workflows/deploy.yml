name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build → Sync → Restart
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Check out the code on the Actions runner ────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up SSH agent with the VPS private key ───────────────
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      # ── 3. Trust the VPS host fingerprint ──────────────────────────
      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # ── 4. Rsync source code to VPS (skip .env and ssl certs) ──────
      - name: Sync code to VPS
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='deploy/.env' \
            --exclude='deploy/nginx/ssl' \
            --exclude='node_modules' \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/alavont/

      # ── 5. Rebuild and restart containers on VPS ───────────────────
      - name: Build images on VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd /opt/alavont/deploy && docker compose build --pull \
             && echo 'BUILD SUCCESS' || (echo 'BUILD FAILED'; exit 1)"

      - name: Stop app containers (preserve DB)
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            cd /opt/alavont/deploy
            # Stop and remove app containers + networks but keep DB volume
            docker compose rm -sf nginx api platform migrate 2>/dev/null || true
            # Wait for network endpoints to fully detach
            sleep 2
            echo "STOP SUCCESS"
          ENDSSH

      - name: Run database migrations
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            cd /opt/alavont/deploy
            docker compose run --rm migrate \
              && echo "MIGRATE SUCCESS" || (echo "MIGRATE FAILED"; exit 1)
          ENDSSH

      - name: Start all services
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            cd /opt/alavont/deploy
            docker compose up -d --remove-orphans \
              && echo "DEPLOY SUCCESS" || (echo "DEPLOY FAILED"; exit 1)
            docker image prune -f
            echo ""
            echo "════════════════════════════════════"
            echo "  DEPLOY SUCCESS — $(date -u)"
            echo "════════════════════════════════════"
          ENDSSH
