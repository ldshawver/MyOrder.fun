#!/usr/bin/env bash
set -Eeuo pipefail

# 🔒 Always run from correct directory
cd /opt/alavont/deploy

echo "== Docker / Compose diagnostics =="
docker compose version
docker version --format '{{.Server.Version}}'

echo "== Pre-clean state =="
docker compose ps -a || true
docker ps -a --format "table {{.ID}}\t{{.Names}}\t{{.Status}}" || true
docker network ls || true

echo "== Clean compose state =="
docker compose down --remove-orphans || true

echo "== Remove leftover project containers =="
ids="$(docker ps -aq --filter "label=com.docker.compose.project")"
if [ -n "${ids}" ]; then
  docker rm -f ${ids} || true
fi

echo "== Remove leftover project networks =="
nets="$(docker network ls -q --filter "label=com.docker.compose.project")"
if [ -n "${nets}" ]; then
  docker network rm ${nets} || true
fi

echo "== Build =="
docker compose build

echo "== Start db only =="
docker compose up -d db

echo "== Wait for db readiness =="
for i in $(seq 1 30); do
  if docker compose exec -T db pg_isready -U "${POSTGRES_USER:-postgres}" >/dev/null 2>&1; then
    echo "DB ready"
    break
  fi
  if [ "$i" -eq 30 ]; then
    echo "DB failed to become ready"
    docker compose logs db || true
    exit 1
  fi
  sleep 2
done

echo "== Run migrations =="
docker compose run --rm migrate

echo "== Start full stack =="
docker compose up -d

echo "== Final state =="
docker compose ps

echo "DEPLOY SUCCESS"
