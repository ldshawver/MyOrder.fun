name: VPS Rescue Diagnostics

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/vps-rescue.yml"
  workflow_dispatch:

jobs:
  rescue:
    name: Inspect and restart VPS edge
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Inspect, reopen web ports, and restart compose edge
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -euxo pipefail

            echo "== host =="
            hostname
            uptime
            date -u

            echo "== deployed sha =="
            cat /opt/alavont/.deployed-sha || true

            echo "== listening ports before =="
            ss -ltnp || true

            echo "== firewall before =="
            ufw status verbose || true
            iptables -S INPUT || true

            echo "== docker compose status before =="
            cd /opt/alavont/deploy
            docker compose ps || true

            echo "== reopen standard web ports if ufw is active =="
            ufw allow 80/tcp || true
            ufw allow 443/tcp || true
            ufw reload || true

            echo "== restart nginx edge =="
            docker compose up -d db api platform nginx < /dev/null
            docker compose restart nginx < /dev/null

            echo "== docker compose status after =="
            docker compose ps

            echo "== listening ports after =="
            ss -ltnp || true

            echo "== local health probes =="
            curl -fsS --max-time 10 http://127.0.0.1/health || true
            for attempt in $(seq 1 30); do
              if curl -fsS --max-time 10 http://127.0.0.1/api/healthz; then
                break
              fi
              echo "  API not ready yet — retry ${attempt}/30"
              sleep 2
            done
            curl -kfsS --max-time 10 https://127.0.0.1/api/healthz || true

            echo "== recent nginx logs =="
            docker compose logs --tail=80 nginx || true

            echo "== recent api logs =="
            docker compose logs --tail=80 api || true
          ENDSSH

      - name: External verification from GitHub runner
        run: |
          curl -Iv --connect-timeout 10 --max-time 20 https://myorder.fun
          for attempt in $(seq 1 30); do
            if curl -fsS --connect-timeout 10 --max-time 20 https://myorder.fun/api/healthz; then
              exit 0
            fi
            echo "API not reachable publicly yet — retry ${attempt}/30"
            sleep 2
          done
          exit 1
