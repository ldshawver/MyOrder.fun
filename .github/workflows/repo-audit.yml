name: Repo Audit

on:
  push:
    branches: [main]
  pull_request:

jobs:
  repo-audit:
    name: repo-audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify required files
        run: |
          test -f package.json
          test -f pnpm-lock.yaml
          test -f .gitignore

      - name: Fail if real env files are committed
        run: |
          ! find . \
            -path "./node_modules" -prune -o \
            -path "./.git" -prune -o \
            -name ".env" -o \
            -name ".env.production" -o \
            -name ".env.local" \
            | grep .

      - name: Check for obvious committed secret values
        run: |
          ! grep -RInE "(sk_live_[A-Za-z0-9]{16,}|sk-[A-Za-z0-9_-]{32,}|github_pat_[A-Za-z0-9_]{30,}|xox[baprs]-[A-Za-z0-9-]{20,})" . \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude="pnpm-lock.yaml"
