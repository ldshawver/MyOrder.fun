server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1024;

    # ── Security headers (applied to every response) ─────────────────────────
    add_header X-Content-Type-Options  "nosniff"                          always;
    add_header X-Frame-Options         "DENY"                             always;
    add_header X-XSS-Protection        "1; mode=block"                    always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;

    # Content-Security-Policy — HTTP header takes precedence over the <meta>
    # tag in index.html and is not subject to proxy/CDN stripping.
    # img-src includes `https:` to allow any HTTPS product image (S3, CDN, etc.)
    # script-src is NOT relaxed.
    add_header Content-Security-Policy
        "frame-src 'self' *.jam.dev https://challenges.cloudflare.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' *.jam.dev *.clerk.accounts.dev https://challenges.cloudflare.com; connect-src 'self' *.jam.dev *.clerk.accounts.dev https://clerk-telemetry.com https://*.clerk-telemetry.com https://challenges.cloudflare.com; img-src 'self' data: blob: https: *.jam.dev https://img.clerk.com; style-src 'self' 'unsafe-inline'; worker-src blob: 'self';"
        always;

    # ── SPA routing ──────────────────────────────────────────────────────────
    # index.html must never be browser-cached — stale HTML means stale CSP,
    # stale JS bundle references, and broken deploys.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Content-Type-Options  "nosniff"                          always;
        add_header X-Frame-Options         "DENY"                             always;
        add_header X-XSS-Protection        "1; mode=block"                    always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;
        add_header Content-Security-Policy
            "frame-src 'self' *.jam.dev https://challenges.cloudflare.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' *.jam.dev *.clerk.accounts.dev https://challenges.cloudflare.com; connect-src 'self' *.jam.dev *.clerk.accounts.dev https://clerk-telemetry.com https://*.clerk-telemetry.com https://challenges.cloudflare.com; img-src 'self' data: blob: https: *.jam.dev https://img.clerk.com; style-src 'self' 'unsafe-inline'; worker-src blob: 'self';"
            always;
        try_files $uri /index.html;
    }

    # ── /plasmic-host — Plasmic Studio canvas host ───────────────────────────
    # Must be iframeable from studio.plasmic.app. nginx's add_header inheritance
    # rule means any location block with its own add_headers replaces ALL
    # server-level add_headers for that location, so we re-declare every header
    # we want except X-Frame-Options, and add frame-ancestors CSP instead.
    location /plasmic-host {
        add_header Cache-Control         "no-store, no-cache, must-revalidate"                                             always;
        add_header X-Content-Type-Options "nosniff"                                                                        always;
        add_header X-XSS-Protection      "1; mode=block"                                                                   always;
        add_header Referrer-Policy       "strict-origin-when-cross-origin"                                                 always;
        add_header Content-Security-Policy "frame-ancestors 'self' https://studio.plasmic.app https://*.plasmic.app"      always;
        # NO X-Frame-Options — intentionally omitted so Plasmic Studio can iframe this path
        try_files $uri /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Immutable static assets (hashed filenames from Vite build) ───────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
