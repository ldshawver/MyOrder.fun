name: myorder-dev

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - /etc/myorder/dev.env
    environment:
      TZ: America/Los_Angeles
      POSTGRES_DB: ${POSTGRES_DB:-myorder_dev}
      POSTGRES_USER: ${POSTGRES_USER:-myorder_dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-myorder_dev_password}
    volumes:
      - myorder_dev_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - myorder_dev_internal

  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.migrate
    env_file:
      - /etc/myorder/dev.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://myorder_dev:myorder_dev_password@db:5432/myorder_dev}
      DB_SSL: "false"
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy
    networks:
      - myorder_dev_internal
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
      args:
        DEPLOY_SHA: ${DEPLOY_SHA:-dev}
    restart: unless-stopped
    env_file:
      - /etc/myorder/dev.env
    environment:
      PORT: "8080"
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgresql://myorder_dev:myorder_dev_password@db:5432/myorder_dev}
      DB_SSL: "false"
      CLERK_PROXY_URL: https://dev.myorder.fun/api/__clerk
      RECEIPT_PRINT_ENABLED: "false"
      LABEL_PRINT_ENABLED: "false"
      PRINT_BRIDGE_URL: ""
      PRINT_BRIDGE_API_KEY: ""
      CUPS_SERVER: ""
    depends_on:
      db:
        condition: service_healthy
    networks:
      - myorder_dev_internal

  platform:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.platform
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-pk_test_dev_placeholder_not_live}
        VITE_WOOCOMMERCE_URL: ""
        VITE_CLERK_PROXY_URL: https://dev.myorder.fun/api/__clerk
    restart: unless-stopped
    networks:
      - myorder_dev_internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:18081:80"
    volumes:
      - ./nginx-dev.conf:/etc/nginx/nginx.conf:ro
      - myorder_dev_nginx_logs:/var/log/nginx
    depends_on:
      - api
      - platform
    networks:
      - myorder_dev_internal

volumes:
  myorder_dev_postgres_data:
  myorder_dev_nginx_logs:

networks:
  myorder_dev_internal:
    name: myorder-dev-internal
    driver: bridge
