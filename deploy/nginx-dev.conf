worker_processes auto;

events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  access_log /var/log/nginx/dev.access.log;
  error_log /var/log/nginx/dev.error.log warn;

  upstream myorder_dev_api { server api:8080; }
  upstream myorder_dev_platform { server platform:3000; }

  server {
    listen 80;
    server_name dev.myorder.fun;

    location /api/ {
      proxy_pass http://myorder_dev_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto http;
      proxy_intercept_errors off;
      error_page 502 503 504 = @api_unavailable;
      client_max_body_size 50M;
    }

    location /health {
      proxy_pass http://myorder_dev_api/health;
      proxy_set_header Host $host;
    }

    location / {
      proxy_pass http://myorder_dev_platform;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto http;
    }

    location @api_unavailable {
      default_type application/json;
      return 503 '{"error":"API unavailable","detail":"development api process is not responding"}';
    }
  }
}
